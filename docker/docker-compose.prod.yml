# =============================================================================
# Docker Compose - Producción (override sobre docker-compose.yml)
# =============================================================================
# Uso:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# Requiere un archivo .env.prod con las variables marcadas como required:
#   POSTGRES_PASSWORD, ALLOWED_ORIGINS
# =============================================================================

services:
  # -------------------------------------------
  # PostgreSQL - sin puerto expuesto externamente
  # -------------------------------------------
  db:
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lab17025}
      POSTGRES_USER: ${POSTGRES_USER:-lab17025}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  # -------------------------------------------
  # Backend API - autenticación obligatoria
  # -------------------------------------------
  api:
    ports: []
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lab17025}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-lab17025}
      API_PORT: "3000"
      RUN_MIGRATIONS: "true"
      REQUIRE_AUTH: "true"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      GOOGLE_CREDENTIALS_PATH: /run/secrets/google_credentials
      GOOGLE_SPREADSHEET_ID: ${GOOGLE_SPREADSHEET_ID:-}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:-}

  # -------------------------------------------
  # Frontend - producción
  # -------------------------------------------
  frontend:
    build:
      args:
        VITE_API_URL: /api
        VITE_APP_ENV: production
        VITE_AUTH_BYPASS: "false"
    ports:
      - "80:80"
