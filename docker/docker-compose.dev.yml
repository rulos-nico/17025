# =============================================================================
# Docker Compose - Desarrollo con hot-reload y observabilidad
# =============================================================================
# Uso basico (solo servicios core):
#   docker compose -f docker/docker-compose.dev.yml up -d
#
# Con monitoreo (Prometheus, Grafana, Loki):
#   docker compose -f docker/docker-compose.dev.yml --profile monitoring up -d
#
# Con panel de base de datos (Adminer):
#   docker compose -f docker/docker-compose.dev.yml --profile dbadmin up -d
#
# Todo:
#   docker compose -f docker/docker-compose.dev.yml --profile monitoring --profile dbadmin up -d
#
# O usando el Makefile:
#   make dev          (core)
#   make dev-full     (todo)
#   make dev-db       (core + adminer)
#   make dev-monitoring (core + prometheus/grafana/loki)
# =============================================================================

services:
  # -------------------------------------------
  # PostgreSQL
  # -------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: lab17025-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lab17025
      POSTGRES_USER: lab17025
      POSTGRES_PASSWORD: lab17025_dev
    ports:
      # Puerto 5434 para evitar conflicto con docker-compose.yml que usa 5433
      - "5434:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab17025 -d lab17025"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "logging=promtail"

  # -------------------------------------------
  # Backend API (Rust/Axum + cargo-watch)
  # -------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api.dev
    container_name: lab17025-dev-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://lab17025:lab17025_dev@db:5432/lab17025
      API_PORT: "3000"
      RUN_MIGRATIONS: "true"
      REQUIRE_AUTH: "false"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost,http://localhost:80"
      RUST_LOG: "lab_17025_api=debug,tower_http=debug"
      RUST_BACKTRACE: "1"
    ports:
      - "3000:3000"
    volumes:
      # Montar codigo fuente para hot-reload
      - ../src/api/src:/app/src
      - ../src/api/migrations:/app/migrations
      # Volumen nombrado para cache de compilacion (persiste entre reinicios)
      - cargo-target-dev:/app/target
      - cargo-registry-dev:/usr/local/cargo/registry
    healthcheck:
      # curl esta disponible en rust:1.88-bookworm (basada en buildpack-deps)
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - "logging=promtail"

  # -------------------------------------------
  # Frontend (Vite dev server con HMR)
  # -------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.dev
    container_name: lab17025-dev-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_APP_ENV: development
      VITE_AUTH_BYPASS: "true"
    ports:
      - "5173:5173"
    volumes:
      # Montar codigo fuente para HMR
      - ../src:/app/src
      - ../public:/app/public
      - ../index.html:/app/index.html
      - ../vite.config.ts:/app/vite.config.ts
      - ../tsconfig.json:/app/tsconfig.json
      - ../tsconfig.node.json:/app/tsconfig.node.json
      # Excluir node_modules del bind mount (usar los del container)
      - /app/node_modules
      # Excluir el backend Rust del frontend
      - /app/src/api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "logging=promtail"

  # -------------------------------------------
  # Adminer - Panel web para PostgreSQL
  # -------------------------------------------
  adminer:
    image: adminer:latest
    container_name: lab17025-dev-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    profiles:
      - dbadmin

  # -------------------------------------------
  # Prometheus - Recoleccion de metricas
  # -------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: lab17025-dev-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-dev:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    profiles:
      - monitoring

  # -------------------------------------------
  # Loki - Agregacion de logs
  # -------------------------------------------
  loki:
    image: grafana/loki:3.6.7
    container_name: lab17025-dev-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data-dev:/loki
    command: -config.file=/etc/loki/local-config.yaml
    profiles:
      - monitoring

  # -------------------------------------------
  # Promtail - Recolector de logs para Loki
  # -------------------------------------------
  promtail:
    image: grafana/promtail:3.6.7
    container_name: lab17025-dev-promtail
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    profiles:
      - monitoring

  # -------------------------------------------
  # Grafana - Dashboards
  # -------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: lab17025-dev-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data-dev:/var/lib/grafana
    profiles:
      - monitoring

volumes:
  pgdata-dev:
    driver: local
  cargo-target-dev:
    driver: local
  cargo-registry-dev:
    driver: local
  prometheus-data-dev:
    driver: local
  loki-data-dev:
    driver: local
  grafana-data-dev:
    driver: local
